<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detector</title>
    <script>
        let xhttp = new XMLHttpRequest();
        xhttp.onreadystatechange = function() {
            if (this.readyState == 4 && this.status == 200) {
                document.getElementById("system_response").innerHTML = xhttp.responseText;
            }
        };
        function runSentimentAnalysis() {
            let textToAnalyze = document.getElementById("textToAnalyze").value;
            xhttp.open("GET", "emotionDetector?textToAnalyze" + "=" + textToAnalyze, true);
            xhttp.send();
        }
    </script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        textarea { width: 80%; height: 100px; padding: 10px; margin: 20px 0; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        #system_response { margin-top: 20px; font-weight: bold; color: blue; }
    </style>
</head>
<body>
    <h1>Emotion Detector</h1>
    <p>Enter text to analyze its emotion:</p>
    <textarea id="textToAnalyze"></textarea><br>
    <button onclick="runSentimentAnalysis()">Run Analysis</button>
    <div id="system_response"></div>
</body>
</html>
